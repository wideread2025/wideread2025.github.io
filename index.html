ay from the expansion, is linked (in cis) with expanded alleles in 80.8% of FECD alleles with an expansion, compared with 12.5% in FECD alleles in cases without an expansion and 14.6% in Europeans.\n\n### Discussion\n\nWe demonstrate that long-range PCR and long-read nanopore sequencing is a sensitive method requiring only nanograms of DNA, which can be scaled up for high-throughput detection and accurate sizing of CTG18.1 in peripheral blood DNA. The SNP, rs599550, is in linkage disequilibrium with the expansion and physically closer than rs613872, previously used in FECD association studies, making it better for use in diagnostic or association studies.\n\n",

    "date": "2025-07-28",
    "abstract": "\n### Background\n\nLong-read sequencing technologies enable resolution of structural variants (SV) and long-range genome assembly, but require high molecular weight (HMW) DNA of both high quantity and quality to produce optimal sequencing results. New DNA extraction methods have been developed but these have not been assessed for use in routine testing. The interlaboratory study described here tested four commonly used methods: Fire Monkey, Nanobind, Puregene and Genomic-tip with a reference cell line containing known chromosomal alterations. Samples were assessed with commonly applied approaches for evaluating DNA purity and integrity as well as a method based on linkage using digital PCR. Sequencing performance was evaluated and the impact of extraction method on structural variant calling investigated.\n\n### Results\n\nAll methods generally produced samples of acceptable purity although yield varied considerably between laboratories. Library preparation and sequencing were successful for all four methods, with Fire Monkey extracts achieving the highest N50 values, Genomic Tip giving the highest sequencing yields and Nanobind, the highest proportion of ultra-long reads (> 100 kb). The dPCR assay with duplexes at 100 kb and 150 kb distances was predictive of ultra-long reads and provides a more quantitative read-out (% linkage) than pulse-field gel electrophoresis (PFGE) which varied in performance between instruments and gel dyes. Neither PFGE nor dPCR were predictive of the proportion of short reads (< 10 kb). Coverage was a key factor in the success of SV calling, but this was dependent on SV caller. Megabase scale SVs were challenging to analyse with SV callers and required confirmation based on coverage plots and mapping of junction sequences, and the findings of earlier studies were only partially confirmed.\n\n### Conclusions\n\nThis study highlights some of the challenges of HMW DNA extraction as well as the need for robust sample QC metrics to ensure optimal sequencing yield and read length which in turn influence the success of SV analysis. dPCR approaches for DNA integrity showed potential but require further development. As long-read methods are increasingly applied in routine settings such as clinical testing laboratories, cellular reference samples with well-characterised SVs are recommended as controls for the full long-read sequencing workflow.\n\n",

    "abstract": "\n### Background\n\nThe complex 2 Mb *survival motor neuron* (*SMN*) locus on chromosome 5q13, including the spinal muscular atrophy (SMA)-causing gene *SMN1* and modifier *SMN2*, remains incompletely resolved due to numerous segmental duplications. Variation in *SMN2* copy number, presumably influenced by *SMN1* to *SMN2* gene conversion, affects disease severity, though *SMN2* copy number alone has insufficient prognostic value due to limited genotype–phenotype correlations. With advancements in newborn screening and *SMN*-targeted therapies, identifying genetic markers to predict disease progression and treatment response is crucial. Progress has thus far been limited by methodological constraints.\n\n### Methods\n\nTo address this, we developed HapSMA, a method to perform polyploid phasing of the *SMN* locus to enable copy-specific analysis of *SMN* and its surrounding genes. We used HapSMA on publicly available Oxford Nanopore Technologies (ONT) sequencing data of 29 healthy controls and performed long-read, targeted ONT sequencing of the *SMN* locus of 31 patients with SMA.\n\n### Results\n\nIn healthy controls, we identified single nucleotide variants (SNVs) specific to *SMN1* and *SMN2* haplotypes that could serve as gene conversion markers. Broad phasing including the *NAIP* gene allowed for a more complete view of *SMN* locus variation. Genetic variation in *SMN2* haplotypes was larger in SMA patients. Forty-two percent of *SMN2* haplotypes of SMA patients showed varying *SMN1* to *SMN2* gene conversion breakpoints, serving as direct evidence of gene conversion as a common genetic characteristic in SMA and highlighting the importance of inclusion of SMA patients when investigating the *SMN* locus.\n\n### Conclusions\n\nOur findings illustrate that both methodological advances and the analysis of patient samples are required to advance our understanding of complex genetic loci and address critical clinical challenges.\n\n",

    "abstract": "\n### Background\n\nNext-generation sequencing (NGS) has been applied for carrier screening, effectively reducing the incidence of severe diseases. However, some severe, high-prevalent and complex diseases, including spinal muscular atrophy (SMA), α-/β-thalassemia, 21-hydroxylase deficiency (21-OHD), and fragile-X syndrome (FXS), cannot be fully addressed by NGS, resulting in a high residual risk ratio. This study aims to evaluate the clinical utility of a long-read sequencing (LRS) panel for carrier screening of these five complex diseases.\n\n### Methods\n\nA total of 2926 participants were retrospectively enrolled from International Peace Maternity and Child Health Hospital from Jan 2019 to Dec 2022. All the participants were previously screened for 149 genes correlated to 147 diseases by NGS. The samples were collected and analyzed with the LRS panel targeting the five complex diseases.\n\n### Results\n\nLRS identified 236 carrier variants, including 54 for SMA, 113 for α-thalassemia, 19 for β-thalassemia, 47 for 21-OHD, and three for FXS. NGS identified only 56.4% (133/236) of the variants detected by LRS. NGS failed to detect three SMA carriers with *SMN1* intragenic variants, while reported 10 false-positive carriers for α-thalassemia (HKαα miscalled as -α3.7). Both 21-OHD and FXS were beyond its detection scope. NGS identified only three of the seven at-risk couples determined by LRS. The total estimated at-risk couple rate for 151 genes in NGS and LRS panels was 1.0996%. SMA, α-/β-thalassemia, 21-OHD, and FXS were among the top 30 high-prevalent diseases and had a combined at-risk couple rate of 0.2433%, accounting for 22.1% of the total ratio. NGS could only identify 22.7% of the at-risk couples for the five diseases in the LRS panel.\n\n### Conclusions\n\nComprehensive carrier screening for high-prevalent diseases had higher clinical utility than expanding the list of low-prevalent diseases. Incorporating LRS into the NGS carrier screening strategy would facilitate more effective carrier screening.\n\n",

    "abstract": "\n### Background\n\nAllan-Herndon-Dudley syndrome (AHDS) is an X-linked disorder caused by pathogenic variants in the *SLC16A2* gene. Although most reported variants are found in protein-coding regions or adjacent junctions, structural variations (SVs) within non-coding regions have not been previously reported.\n\n### Methods\n\nWe investigated two male siblings with severe neurodevelopmental disorders and spasticity, who had remained undiagnosed for over a decade and were negative from exome sequencing, utilizing long-read HiFi genome sequencing. We conducted a comprehensive analysis including short-tandem repeats (STRs) and SVs to identify the genetic cause in this familial case.\n\n### Results\n\nWhile coding variant and STR analyses yielded negative results, SV analysis revealed a novel hemizygous deletion in intron 1 of the *SLC16A2* gene (chrX:74,460,691 − 74,463,566; 2,876 bp), inherited from their carrier mother and shared by the siblings. Determination of the breakpoints indicates that the deletion probably resulted from Alu/Alu-mediated rearrangements between homologous AluY pairs. The deleted region is predicted to include multiple transcription factor binding sites, such as Stat2, Zic1, Zic2, and FOXD3, which are crucial for the neurodevelopmental process, as well as a regulatory element including an eQTL (rs1263181) that is implicated in the tissue-specific regulation of *SLC16A2* expression, notably in skeletal muscle and thyroid tissues.\n\n### Conclusions\n\nThis report, to our knowledge, is the first to describe a non-coding deletion associated with AHDS, demonstrating the potential utility of long-read sequencing for undiagnosed patients. Although interpreting variants in non-coding regions remains challenging, our study highlights this region as a high priority for future investigation and functional studies.\n\n",

    "abstract": "\n### Background\n\nPrecision in detecting pathogens in sepsis patients is crucial for deploying targeted therapeutic strategies. The objective of the present investigation was to assess the efficacy of targeted nanopore sequencing (TNPseq) as a method for detecting sepsis pathogens.\n\n### Methods\n\nFor this investigation, we stratified 90 patients with sepsis into ‘improved’ and ‘unimproved’ groups based on their clinical outcomes. Pathogenic microorganisms were detected in various sample types on the day of sepsis diagnosis, utilizing both conventional culture and TNPseq techniques. A comparative analysis of these methodologies was undertaken to assess their performance and efficacy in identifying pathogens in sepsis infections and discern pathogens with significant differences between the distinct patient groups.\n\n### Results\n\nThe TNPseq analysis demonstrated superior performance in detecting pathogens in sepsis patients, achieving a significantly higher positivity rate (94.4%) compared to the culture method (30.0%, *p* < 0.001). TNPseq offered enhanced detection capabilities across a diverse array of pathogen types and sample types, outperforming culture particularly in the identification of fungi (35 vs. 8), viruses (46 vs. 1), and atypical pathogens. Both TNPseq and culture yielded concurrent positive results in 26 patient samples, yet TNPseq identified additional pathogens in 14 of these samples. A notable discrepancy in the types of infections was observed between the ‘improved’ and ‘unimproved’ groups, with a higher prevalence of single infections among the ‘improving’ cohort (*p* < 0.05). Significant differences in the incidence of *Acinetobacter baumannii* and *Clostridium striatum* were also evident between the two groups, underscoring the importance of focusing on these two pathogens in future clinical diagnostic efforts.\n\n### Conclusion\n\nThis study underscores the versatility of TNPseq in identifying diverse pathogens in sepsis samples, ensuring its application as a diagnostic when pathogens elude conventional isolation or are difficult to culture. It particularly highlights the significant differences of *A. baumannii* and *C. striatum* in the two patient groups, pointing to potential research directions. TNPseq’s potential in sepsis diagnosis is promising.\n\n",

    "date": "2025-02-18",
    "abstract": "\n### Background\n\nIn various neurodevelopmental disorders (NDDs), sets of differential methylation marks (referred to as DNA methylation signatures or episignatures) are syndrome-specific and useful in evaluating the pathogenicity of detected genetic variants. These signatures have generally been tested using methylation arrays, requiring additional experimental and evaluation costs. As an alternative, long-read sequencing can simultaneously and accurately evaluate genetic and epigenetic changes. In addition, genome-wide DNA methylation profiling with more complete sets of CpG using long-read sequencing (than methylation arrays) may provide alternative but more comprehensive DNA methylation signatures, which have yet to be adequately investigated.\n\n### Methods\n\nNine and seven cases of molecularly diagnosed Sotos syndrome and ATR-X syndrome, respectively, were sequenced using nanopore long-read sequencing, together with 22 controls. Genome-wide differential DNA methylation analysis was performed. Among these differential DNA methylation sites, a single-locus DNA methylation mark at part of the *NSD1* CpG island (CpGi) was subsequently studied in an additional 22 cases with a *NSD1* point mutation or a 5q35 submicroscopic deletion involving *NSD1*. To investigate the potential utility of a single-locus DNA methylation test at *NSD1* CpGi for differential diagnosis, nine cases with *NSD1*-negative clinically overlapping overgrowth intellectual disability syndromes (OGIDs) were also tested.\n\n### Results\n\nLong-read sequencing enabled the successful extraction of two sets of differential methylation marks unique to each of Sotos syndrome and ATR-X syndrome, referred to as long-read-based DNA methylation signatures (LR-DNAm signatures), as alternatives to reported DNA methylation signatures (obtained by methylation array). Additionally, we found that a part, but not all, of the *NSD1* CpGi were hypomethylated compared with the level in controls in both cases harboring *NSD1* point mutations and those with a 5q35 submicroscopic deletion. This difference in methylation is specific to Sotos syndrome and lacking in other OGIDs.\n\n### Conclusions\n\nSimultaneous evaluation of genetic and epigenetic alterations using long-read sequencing may improve the discovery of DNA methylation signatures, which may in turn increase the diagnostic yields. As an example of the outcomes of these analyses, we propose that a single-locus DNA methylation test at *NSD1* CpGi may streamline the molecular diagnosis of Sotos syndrome, regardless of the type of *NSD1* aberration.\n\n",

      "translation": "在多种神经发育障碍（NDDs）中，差异甲基化标记（称为DNA甲基化签名或表观签名）具有综合征特异性，可有效评估检测到的遗传变异的致病性。这些签名通常通过甲基化阵列进行检测，但需要额外的实验和评估成本。作为替代方案，长读长测序能够同时准确评估遗传和表观遗传变化。此外，使用长读长测序进行全基因组DNA甲基化分析（相比甲基化阵列）可获得更完整的CpG集合，可能提供更全面的DNA甲基化签名，但尚未充分研究。\n\n采用纳米孔长读长测序对9例分子确诊的Sotos综合征和7例ATR-X综合征病例进行分析，同时纳入22例对照组。进行全基因组差异DNA甲基化分析。在差异甲基化位点中，进一步研究了NSD1基因CpG岛（CpGi）部分区域的单一位点甲基化标记，分析了22例携带NSD1点突变或5q35亚微缺失的病例。为探讨NSD1 CpGi单一位点甲基化检测在鉴别诊断中的潜在价值，还对9例临床表型重叠的NSD1阴性过生长智力障碍综合征（OGIDs）病例进行了检测。\n\n长读长测序成功提取了Sotos综合征和ATR-X综合征各自特有的两组差异甲基化标记，称为基于长读长测序的DNA甲基化签名（LR-DNAm签名），作为传统甲基化阵列获得的DNA甲基化签名的替代方案。此外，发现携带NSD1点突变和5q35亚微缺失的病例中，NSD1 CpG岛部分区域的甲基化水平较对照组显著降低，但并非全部区域均出现该现象。这种甲基化差异特异性地存在于Sotos综合征中，而在其他OGIDs中未观察到。\n\n通过长读长测序同时评估遗传和表观遗传改变可能提高DNA甲基化签名的发现效率，从而提升诊断率。作为分析结果的示例，我们提出NSD1 CpGi单一位点甲基化检测可能简化Sotos综合征的分子诊断，无论NSD1异常类型如何。"

    "abstract": "\n### Background\n\nA subset of developmental disorders (DD) is characterized by disease-specific genome-wide methylation changes. These episignatures inform on the underlying pathogenic mechanisms and can be used to assess the pathogenicity of genomic variants as well as confirm clinical diagnoses. Currently, the detection of these episignature requires the use of indirect methylation profiling methodologies. We hypothesized that long-read whole genome sequencing would not only enable the detection of single nucleotide variants and structural variants but also episignatures.\n\n### Methods\n\nGenome-wide nanopore sequencing was performed in 40 controls and 20 patients with confirmed or suspected episignature-associated DD, representing 13 distinct diseases. Following genomic variant and methylome calling, hierarchical clustering and dimensional reduction were used to determine the compatibility with microarray-based episignatures. Subsequently, we developed a support vector machine (SVM) for the detection of each DD.\n\n### Results\n\nNanopore sequencing-based methylome patterns were concordant with microarray-based episignatures. Our SVM-based classifier identified the episignatures in 17/19 patients with a (likely) pathogenic variant and none of the controls. The remaining patients in which no episignature was identified were also classified as controls by a commercial microarray assay. In addition, we identified all underlying pathogenic single nucleotide and structural variants and showed haplotype-aware skewed X-inactivation evaluation directs clinical interpretation.\n\n### Conclusion\n\nThis proof-of-concept study demonstrates nanopore sequencing enables episignature detection. In addition, concurrent haplotyped genomic and epigenomic analyses leverage simultaneous detection of single nucleotide/structural variants, X-inactivation, and imprinting, consolidating a multi-step sequential process into a single diagnostic assay.\n\n",

    "date": "2024-11-28",
    "abstract": "\n### Background\n\nThe clinical diagnosis of Fabry Disease (FD) can be challenging due to the clinical heterogeneity, especially in females. Patients with FD often experience a prolonged interval between the onset of symptoms and receiving a diagnosis. Genetic testing is the gold standard for precise diagnosis of FD, however conventional genetic testing could miss deep intronic variants and large deletions or duplications. Although next-generation sequencing, which analyzes numerous genes, has been successfully used for FD diagnosis and can detect complex variants, an effective and rapid tool for identifying a wide range of variants is imminent, contributing to decrease the diagnostic delay.\n\n### Methods\n\nThe comprehensive Analysis of FD (CAFD) assay was developed for FD genetic diagnosis, employing long-range PCR coupled with long-read sequencing to target the full-length *GLA* gene and its flanking regions. Its clinical performance was assessed through a comparative analysis with Sanger sequencing.\n\n### Results\n\nGenetic testing was performed on 82 individuals, including 48 probands and 34 relatives. The CAFD assay additionally identified variants in two probands: one had a novel and de novo pathogenic variant with a 1715 bp insertion in intron 4, and the other carried two deep intronic VUS variants in cis-configuration also in intron 4. In total, CAFD identified 47 different variants among 48 probands. Of these, 42 (89.36%, 42/47) were pathogenic, while 5 (10.64%, 5/47) were VUS. Sixteen (34.04%, 16/47) of the variants were novel, including 15 SNV/Indels and one large intronic insertion. Pedigree analysis of 21 probands identified four de novo disease-causing variants. Hence, FD exhibits not only variable clinical presentations but also a wide spectrum of variants. Utilizing a comprehensive testing algorithm for diagnosing FD, which includes enzyme activity, clinical features, and genetic testing, the diagnostic yield of CAFD is 97.92% (47/48), which is higher than that of conventional Sanger sequencing, at 95.83% (46/48).\n\n### Conclusion\n\nThe duration between initial clinical presentation and diagnosis remains long and winding. CAFD provides precise diagnosis for a wide spectrum of *GL*A variants, promoting timely diagnosis and appropriate treatment for FD patients.\n\n",

      "translation": "### 背景\n法布里病（Fabry Disease, FD）的临床诊断面临挑战，尤其在女性患者中表现出显著的临床异质性。FD患者常经历症状出现与确诊之间的长期延迟。尽管基因检测是FD精准诊断的金标准，但传统基因检测方法可能漏诊深内含子变异及大片段缺失或重复。虽然下一代测序技术（NGS）通过分析多基因可成功用于FD诊断并检测复杂变异，但亟需一种高效快速的工具以识别广泛变异，从而缩短诊断延迟。\n\n### 方法\n开发了全面分析法布里病（Comprehensive Analysis of FD, CAFD）检测方法，采用长距离PCR结合长读长测序技术，靶向全长GLA基因及其邻近区域。通过与Sanger测序的对比分析评估其临床性能。\n\n### 结果\n对82名个体（包括48名受试者和34名亲属）进行了基因检测。CAFD检测在两名受试者中额外识别出变异：一名携带新型de novo致病性变异（内含子4中1715 bp插入），另一名携带两个内含子4中cis配置的深内含子VUS变异。在48名受试者中共检测到47种不同变异，其中42种（89.36%）为致病性，5种（10.64%）为VUS。16种（34.04%）为新型变异，包括15种SNV/Indels和1种大内含子插入。对21名受试者的家系分析发现4种de novo致病变异。因此，FD不仅表现出临床表型的多样性，还存在广泛的变异谱系。采用包含酶活性、临床特征和基因检测的综合诊断算法，CAFD的诊断效率为97.92%（47/48），显著高于常规Sanger测序的95.83%（46/48）。\n\n### 结论\n从首次临床表现到确诊的时间仍较长。CAFD可精准诊断广泛的GLA基因变异，有助于FD患者的及时诊断和恰当治疗。"

    "abstract": "\n### Background\n\nLung cancer is a heterogeneous disease and the primary cause of cancer-related mortality worldwide. Somatic mutations, including large structural variants, are important biomarkers in lung cancer for selecting targeted therapy. Genomic studies in lung cancer have been conducted using short-read sequencing. Emerging long-read sequencing technologies are a promising alternative to study somatic structural variants, however there is no current consensus on how to process data and call somatic events. In this study, we preformed whole genome sequencing of lung cancer and matched non-tumour samples using long and short read sequencing to comprehensively benchmark three sequence aligners and seven structural variant callers comprised of generic callers (SVIM, Sniffles2, DELLY in generic mode and cuteSV) and somatic callers (Severus, SAVANA, nanomonsv and DELLY in somatic modes).\n\n### Results\n\nDifferent combinations of aligners and variant callers influenced somatic structural variant detection. The choice of caller had a significant influence on somatic structural variant detection in terms of variant type, size, sensitivity, and accuracy. The performance of each variant caller was assessed by comparing to somatic structural variants identified by short-read sequencing. When compared to somatic structural variants detected with short-read sequencing, more events were detected with long-read sequencing. The mean recall of somatic variant events identified by long-read sequencing was higher for the somatic callers (72%) than generic callers (53%). Among the somatic callers when using the minimap2 aligner, SAVANA and Severus achieved the highest recall at 79.5% and 79.25% respectively, followed by nanomonsv with a recall of 72.5%.\n\n### Conclusion\n\nLong-read sequencing can identify somatic structural variants in clincal samples. The longer reads have the potential to improve our understanding of cancer development and inform personalized cancer treatment.\n\n",

    "abstract": "\n\nNext-generation sequencing (NGS) technologies have revolutionized the field of genomics by enabling high-throughput, cost-effective, and rapid DNA sequencing on an unprecedented scale. This introduction offers a synopsis of NGS and its profound implications across diverse areas of biological research and medical diagnostics. The fundamental principles underlying NGS, including library preparation, sequencing-by-synthesis, and data generation, are outlined. The different NGS platforms, such as Illumina, Ion Torrent, and Oxford Nanopore, as well as their respective strengths and limitations, are discussed. Recent advancements in sequencing technologies, such as single-cell sequencing, long-read sequencing, and spatial transcriptomics, are explored, expanding the capabilities of NGS and facilitating comprehensive genomic investigations. Subsequently, the applications of NGS in genomics, transcriptomics, epigenomics, metagenomics, and personalized medicine are examined. The accelerated discovery of genetic variants, gene expression patterns, DNA methylation profiles, and microbial communities through NGS is emphasized. Moreover, the role of NGS in uncovering disease mechanisms, identifying therapeutic targets, and enabling precision medicine approaches is discussed. Furthermore, the computational challenges associated with NGS data analysis, including read alignment, variant calling, and data interpretation, are addressed. The pivotal role of bioinformatics and data analysis pipelines in transforming raw sequencing data into biologically meaningful insights is highlighted. Additionally, the integration of NGS data with other omics datasets and the emerging field of multi-omics integration, providing a holistic view of biological systems, are briefly touched upon.\n\nAdditionally, the impact of NGS on clinical diagnostics, encompassing the detection of genetic disorders, cancer genomics, infectious disease surveillance, and pharmacogenomics, is elucidated. The potential of NGS-based liquid biopsies and non-invasive prenatal testing in revolutionizing clinical practice is underscored. Lastly, the challenges and considerations associated with NGS, such as data storage, privacy concerns, ethical considerations, and the importance of standardization and quality control measures, are addressed. The significance of interdisciplinary collaborations among scientists, clinicians, and bioinformaticians in harnessing the full potential of NGS and driving innovation in genomic research and healthcare is emphasized. In conclusion, this comprehensive introduction to next-generation sequencing provides an overview of the technology, its applications, and its impact across various fields. By empowering researchers and clinicians with unprecedented genomic information, NGS has the potential to revolutionize our understanding of biological systems, unravel disease complexities, and facilitate personalized approaches to healthcare.\n\n",

    "abstract": "\n\nThe assignment of variants across haplotypes, phasing, is crucial for predicting the consequences, interaction, and inheritance of mutations and is a key step in improving our understanding of phenotype and disease. However, phasing is limited by read length and stretches of homozygosity along the genome. To overcome this limitation, we designed MethPhaser, a method that utilizes methylation signals from Oxford Nanopore Technologies to extend Single Nucleotide Variation (SNV)-based phasing. We demonstrate that haplotype-specific methylations extensively exist in Human genomes and the advent of long-read technologies enabled direct report of methylation signals. For ONT R9 and R10 cell line data, we increase the phase length N50 by 78%-151% at a phasing accuracy of 83.4-98.7% To assess the impact of tissue purity and random methylation signals due to inactivation, we also applied MethPhaser on blood samples from 4 patients, still showing improvements over SNV-only phasing. MethPhaser further improves phasing across *HLA* and multiple other medically relevant genes, improving our understanding of how mutations interact across multiple phenotypes. The concept of MethPhaser can also be extended to non-human diploid genomes. MethPhaser is available at <https://github.com/treangenlab/methphaser>.\n\n",

    "date": "2024-05-31",
    "abstract": "\n### Background\n\nMitochondrial diseases (MDs) can be caused by single nucleotide variants (SNVs) and structural variants (SVs) in the mitochondrial genome (mtDNA). Presently, identifying deletions in small to medium-sized fragments and accurately detecting low-percentage variants remains challenging due to the limitations of next-generation sequencing (NGS).\n\n### Methods\n\nIn this study, we integrated targeted long-range polymerase chain reaction (LR-PCR) and PacBio HiFi sequencing to analyze 34 participants, including 28 patients and 6 controls. Of these, 17 samples were subjected to both targeted LR-PCR and NGS to compare the mtDNA variant detection efficacy.\n\n### Results\n\nAmong the 28 patients tested by long-read sequencing (LRS), 2 patients were found positive for the m.3243 A > G hotspot variant, and 20 patients exhibited single or multiple deletion variants with a proportion exceeding 4%. Comparison between the results of LRS and NGS revealed that both methods exhibited similar efficacy in detecting SNVs exceeding 5%. However, LRS outperformed NGS in detecting SNVs with a ratio below 5%. As for SVs, LRS identified single or multiple deletions in 13 out of 17 cases, whereas NGS only detected single deletions in 8 cases. Furthermore, deletions identified by LRS were validated by Sanger sequencing and quantified in single muscle fibers using real-time PCR. Notably, LRS also effectively and accurately identified secondary mtDNA deletions in idiopathic inflammatory myopathies (IIMs).\n\n### Conclusions\n\nLRS outperforms NGS in detecting various types of SNVs and SVs in mtDNA, including those with low frequencies. Our research is a significant advancement in medical comprehension and will provide profound insights into genetics.\n\n",

    "abstract": "\n### Background\n\nBiallelic variants in *EYS* are the major cause of autosomal recessive retinitis pigmentosa (arRP) in certain populations, a clinically and genetically heterogeneous disease that may lead to legal blindness. *EYS* is one of the largest genes (~ 2 Mb) expressed in the retina, in which structural variants (SVs) represent a common cause of disease. However, their identification using short-read sequencing (SRS) is not always feasible. Here, we conducted targeted long-read sequencing (T-LRS) using adaptive sampling of *EYS* on the MinION sequencing platform (Oxford Nanopore Technologies) to definitively diagnose an arRP family, whose affected individuals (*n* = 3) carried the heterozygous pathogenic deletion of exons 32–33 in the *EYS* gene. As this was a recurrent variant identified in three additional families in our cohort, we also aimed to characterize the known deletion at the nucleotide level to assess a possible founder effect.\n\n### Results\n\nT-LRS in family A unveiled a heterozygous AluYa5 insertion in the coding exon 43 of *EYS* (chr6(GRCh37):g.64430524_64430525ins352), which segregated with the disease in compound heterozygosity with the previously identified deletion. Visual inspection of previous SRS alignments using IGV revealed several reads containing soft-clipped bases, accompanied by a slight drop in coverage at the Alu insertion site. This prompted us to develop a simplified program using *grep* command to investigate the recurrence of this variant in our cohort from SRS data. Moreover, LRS also allowed the characterization of the CNV as a ~ 56.4kb deletion spanning exons 32–33 of *EYS* (chr6(GRCh37):g.64764235_64820592del). The results of further characterization by Sanger sequencing and linkage analysis in the four families were consistent with a founder variant.\n\n### Conclusions\n\nTo our knowledge, this is the first report of a mobile element insertion into the coding sequence of *EYS,* as a likely cause of     "abstract": "\n### Background\n\nWhole genome sequencing is increasingly being used for the diagnosis of patients with rare diseases. However, the diagnostic yields of many studies, particularly those conducted in a healthcare setting, are often disappointingly low, at 25–30%. This is in part because although entire genomes are sequenced, analysis is often confined to in silico gene panels or coding regions of the genome.\n\n### Methods\n\nWe undertook WGS on a cohort of 122 unrelated rare disease patients and their relatives (300 genomes) who had been pre-screened by gene panels or arrays. Patients were recruited from a broad spectrum of clinical specialties. We applied a bioinformatics pipeline that would allow comprehensive analysis of all variant types. We combined established bioinformatics tools for phenotypic and genomic analysis with our novel algorithms (SVRare, ALTSPLICE and GREEN-DB) to detect and annotate structural, splice site and non-coding variants.\n\n### Results\n\nOur diagnostic yield was 43/122 cases (35%), although 47/122 cases (39%) were considered solved when considering novel candidate genes with supporting functional data into account. Structural, splice site and deep intronic variants contributed to 20/47 (43%) of our solved cases. Five genes that are novel, or were novel at the time of discovery, were identified, whilst a further three genes are putative novel disease genes with evidence of causality. We identified variants of uncertain significance in a further fourteen candidate genes. The phenotypic spectrum associated with *RMND1* was expanded to include polymicrogyria. Two patients with secondary findings in *FBN1* and *KCNQ1* were confirmed to have previously unidentified Marfan and long QT syndromes, respectively, and were referred for further clinical interventions. Clinical diagnoses were changed in six patients and treatment adjustments made for eight individuals, which for five patients was considered life-saving.\n\n### Conclusions\n\nGenome sequencing is increasingly being considered as a first-line genetic test in routine clinical settings and can make a substantial contribution to rapidly identifying a causal aetiology for many patients, shortening their diagnostic odyssey. We have demonstrated that structural, splice site and intronic variants make a significant contribution to diagnostic yield and that comprehensive analysis of the entire genome is essential to maximise the value of clinical genome sequencing.\n\n",

    "abstract": "\n### Background\n\nLong-read sequencing is increasingly used to uncover structural variants in the human genome, both functionally neutral and deleterious. Structural variants occur more frequently in regions with a high homology or repetitive segments, and one rearrangement may predispose to additional events. Bartter syndrome type 3 (BS 3) is a monogenic tubulopathy caused by deleterious variants in the chloride channel gene *CLCNKB*, a high proportion of these being large gene deletions. Multiplex ligation-dependent probe amplification, the current diagnostic gold standard for this type of mutation, will indicate a simple homozygous gene deletion in biallelic deletion carriers. However, since the phenotypic spectrum of BS 3 is broad even among biallelic deletion carriers, we undertook a more detailed analysis of precise breakpoint regions and genomic structure.\n\n### Methods\n\nStructural variants in 32 BS 3 patients from 29 families and one BS4b patient with *CLCNKB* deletions were investigated using long-read and synthetic long-read sequencing, as well as targeted long-read sequencing approaches.\n\n### Results\n\nWe report a ~3 kb duplication of 3′-UTR *CLCNKB* material transposed to the corresponding locus of the neighbouring *CLCNKA* gene, also found on ~50 % of alleles in healthy control individuals. This previously unknown common haplotype is significantly enriched in our cohort of patients with *CLCNKB* deletions (45 of 51 alleles with haplotype information, 2.2 kb and 3.0 kb transposition taken together, *p*=9.16×10−9). Breakpoint coordinates for the *CLCNKB* deletion were identifiable in 28 patients, with three being compound heterozygous. In total, eight different alleles were found, one of them a complex rearrangement with three breakpoint regions. Two patients had different *CLCNKA/CLCNKB* hybrid genes encoding a predicted *CLCNKA/CLCNKB* hybrid protein with likely residual function.\n\n### Conclusions\n\nThe presence of multiple d rotocol.\n\n",

    "abstract": "\n### Background\n\nHaploinsufficiency of the transcription factor PAX6 is the main cause of congenital aniridia, a genetic disorder characterized by iris and foveal hypoplasia. 11p13 microdeletions altering *PAX6* or its downstream regulatory region (DRR) are present in about 25% of patients; however, only a few complex rearrangements have been described to date. Here, we performed nanopore-based whole-genome sequencing to assess the presence of cryptic structural variants (SVs) on the only two unsolved “*PAX6*-negative” cases from a cohort of 110 patients with congenital aniridia after unsuccessfully short-read sequencing approaches.\n\n### Results\n\nLong-read sequencing (LRS) unveiled balanced chromosomal rearrangements affecting the *PAX6 locus* at 11p13 in these two patients and allowed nucleotide-level breakpoint analysis. First, we identified a cryptic 4.9 Mb de novo inversion disrupting intron 7 of *PAX6,* further verified by targeted polymerase chain reaction amplification and sequencing and FISH-based cytogenetic analysis*.* Furthermore, LRS was decisive in correctly mapping a t(6;11) balanced translocation cytogenetically detected in a second proband with congenital aniridia and considered non-causal 15 years ago. LRS resolved that the breakpoint on chromosome 11 was indeed located at 11p13, disrupting the DNase I hypersensitive site 2 enhancer within the DRR of *PAX6,* 161 Kb from the causal gene. Patient-derived RNA expression analysis demonstrated *PAX6* haploinsufficiency, thus supporting that the 11p13 breakpoint led to a positional effect by cleaving crucial enhancers for *PAX6* transactivation. LRS analysis was also critical for mapping the exact breakpoint on chromosome 6 to the highly repetitive centromeric region at 6p11.1.\n\n### Conclusions\n\nIn both cases, the LRS-based identified SVs have been deemed the hidden pathogenic cause of congenital aniridia. Our study underscores the limitations of traditional short-read sequencing in uncovering pathogenic SVs affecting low-complexity regions of the genome and the value of LRS in providing insight into hidden sources of variation in rare genetic diseases.\n\n",

    "abstract": "\n\nTranscriptome profiling is a mainstay of translational cancer research and is increasingly finding its way into precision oncology. While bulk RNA sequencing (RNA-seq) is widely available, high investment costs and long data return time are limiting factors for clinical applications. We investigated a portable nanopore long-read sequencing device (MinION, Oxford Nanopore Technologies) for transcriptome profiling of tumors. In particular, we investigated the impact of lower coverage than that of larger sequencing devices by comparing shallow nanopore RNA-seq data with short-read RNA-seq data generated using reversible dye terminator technology (Illumina) for ten samples representing four cancer types. Coupled with ShaNTi (Shallow Nanopore sequencing for Transcriptomics), a newly developed data processing pipeline, a turnaround time of five days was achieved. The correlation of normalized gene-level counts between nanopore and Illumina RNA-seq was high for MinION but not for very low-throughput Flongle flow cells (r = 0.89 and r = 0.24, respectively). A cost-saving approach based on multiplexing of four samples per MinION flow cell maintained a high correlation with Illumina data (r = 0.56–0.86). In addition, we compared the utility of nanopore and Illumina RNA-seq data for analysis tools commonly applied in translational oncology: (1) Shallow nanopore and Illumina RNA-seq were equally useful for inferring signaling pathway activities with PROGENy. (2) Highly expressed genes encoding kinases targeted by clinically approved small-molecule inhibitors were reliably identified by shallow nanopore RNA-seq. (3) In tumor microenvironment composition analysis, quanTIseq performed better than CIBERSORT, likely due to higher average expression of the gene set used for deconvolution. (4) Shallow nanopore RNA-seq was successfully applied to detect fusion genes using the JAFFAL pipeline. These findings suggest that shallow nanopore RNA-seq enables rapid and biologically meaningful transcriptome profiling of tumors, and warrants further exploration in precision cancer medicine studies.\n\n",

            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            transform: translateY(-2px);
        }
        .paper-card.read {
            opacity: 0.7;
            background-color: #f5f5f5;
            border-color: #d0d0d0;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background-color: white;
            padding: 25px;
            border-radius: 8px;
            max-width: 1200px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            margin: 2% auto;
        }
        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 20px;
            cursor: pointer;
            color: #666;
            transition: color 0.2s;
        }
        .close-btn:hover {
            color: #333;
        }
        .keywords {
            margin: 12px 0;
            flex-wrap: wrap;
            display: flex;
            gap: 6px;
        }
        .keyword {
  display: inline-block;
  margin: 0.05em 0.2em 0.05em 0;
  padding: 0.05em 0.4em;
  border-radius: 1em;
  background-color: #e3f2fd;
  color: #1976d2;
  font-size: 0.85em;
}

.paper-title {
    margin: 0;
    font-size: 1.2em;
    color: #202124;
    line-height: 1.3;
}
        .translation {
            margin-top: 12px;
            font-size: 0.9em;
            color: #333;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .details h2 {
            color: #202124;
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 1.5em;
        }
        .details p {
            margin: 10px 0;
            line-height: 1.6;
            font-size: 14px;
        }
        .paper-abstract {
            margin: 15px 0;
            padding: 10px;
            background-color: #f9f9f9;
            border-radius: 5px;
        }
        .details strong {
            color: #202124;
        }
        .details a {
            color: #1967d2;
            text-decoration: none;
        }
        .details a:hover {
            text-decoration: underline;
        }
        @media (max-width: 992px) {
            .container {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 600px) {
            .container {
                grid-template-columns: 1fr;
                padding: 10px;
            }
            .modal-content {
                padding: 15px;
                max-height: 90vh;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="papers-container"></div>

    <div class="modal" id="paper-modal">
        <div class="modal-content">
            <span class="close-btn" id="close-modal">&times;</span>
            <div id="modal-details" class="details"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('papers-container');
            const modal = document.getElementById('paper-modal');
            const modalDetails = document.getElementById('modal-details');
            const closeModal = document.getElementById('close-modal');
            const readPapers = new Set();

            // 关闭模态框函数
            function closePaperModal() {
                modal.style.display = 'none';
                document.body.style.overflow = 'auto'; // 恢复背景滚动
            }

            // 关闭按钮事件
            closeModal.addEventListener('click', closePaperModal);

            // 点击模态框外部关闭
            modal.addEventListener('click', (e) => {
                if (e.target === modal) closePaperModal();
            });

            // 尝试从localStorage加载已读状态
            const savedRead = localStorage.getItem('readPapers');
            if (savedRead) {
                JSON.parse(savedRead).forEach(index => readPapers.add(index));
            }

            // 1. 数据加载函数
            function loadPapersData(jsonUrl) {
                // 检查是否存在嵌入的静态JSON数据
                if (window.embeddedPapersData) {
                    // 静态模式：直接使用嵌入数据
                    return Promise.resolve(window.embeddedPapersData)
                    .then(papers => {
                        if (!Array.isArray(papers)) throw new Error('嵌入的论文数据格式不正确');
                        return papers;
                    });
                } else {
                    // 动态模式：从URL加载数据
                    return fetch(jsonUrl)
                    .then(response => {
                        if (!response.ok) throw new Error('无法加载论文数据: ' + response.statusText);
                        return response.json();
                    })
                    .then(papers => {
                        if (!Array.isArray(papers)) throw new Error('论文数据格式不正确');
                        return papers;
                    });
                }
            }

            // 2. 卡片渲染函数
            function renderPapersCards(container, papers) {
                papers.forEach((paper, index) => {
                    const card = document.createElement('div');
                    card.className = `paper-card ${readPapers.has(index) ? 'read' : ''}`;
                    card.dataset.index = index;

                    // 标题
                    const title = document.createElement('h3');
                    title.className = 'paper-title';
                    title.textContent = paper.title || '无标题';
                    card.appendChild(title);
                    title.style.marginBottom = '0.5em';

                    // 添加期刊和日期信息
                    const meta = document.createElement('div');
                    meta.className = 'paper-meta';
                    meta.textContent = `${paper.journal || '未知期刊'} · ${paper.date || '未知日期'}`;
                    meta.style.fontSize = '0.8em';
                    meta.style.marginTop = '0.5em';
                    card.appendChild(meta);

                    const keywordsContainer = document.createElement('div');
                    keywordsContainer.className = 'keywords';
                    if (paper.ai && paper.ai.keywords && Array.isArray(paper.ai.keywords)) {
                        const maxKeywords = 20;
                        if (paper.ai.keywords.length > maxKeywords) {
                            paper.ai.keywords.slice(0, maxKeywords).forEach(keyword => {
                                const keywordSpan = document.createElement('span');
                                keywordSpan.className = 'keyword';
                                keywordSpan.textContent = keyword;
                                keywordsContainer.appendChild(keywordSpan);
                            });
                            const moreSpan = document.createElement('span');
                            moreSpan.className = 'keyword';
                            moreSpan.textContent = `...等${paper.ai.keywords.length}个关键词`;
                            keywordsContainer.appendChild(moreSpan);
                        } else {
                            paper.ai.keywords.forEach(keyword => {
                                const keywordSpan = document.createElement('span');
                                keywordSpan.className = 'keyword';
                                keywordSpan.textContent = keyword;
                                keywordsContainer.appendChild(keywordSpan);
                            });
                        }
                    } else {
                        const noKeyword = document.createElement('span');
                        noKeyword.className = 'keyword';
                        noKeyword.textContent = '无关键词';
                        keywordsContainer.appendChild(noKeyword);
                    }
                    card.appendChild(keywordsContainer);

                    // 添加TLDR
                    if (paper.ai && paper.ai.TLDR) {
                        const tldr = document.createElement('div');
                        tldr.className = 'paper-tldr';
                        tldr.textContent = paper.ai.TLDR;
                        card.appendChild(tldr);
                    }

                    container.appendChild(card);

                    // 点击卡片显示详情
                    card.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const index = parseInt(card.dataset.index);
                        readPapers.add(index);
                        card.classList.add('read');
                        localStorage.setItem('readPapers', JSON.stringify(Array.from(readPapers)));
                        displayDetails(paper);

                        // 确保模态框显示在最前面
                        modal.style.display = 'flex';
                        modal.style.zIndex = '9999';
                        modalDetails.style.zIndex = '10000';
                        document.body.style.overflow = 'hidden';

                        // 添加点击外部关闭功能
                        modal.addEventListener('click', (e) => {
                            if (e.target === modal) {
                                modal.style.display = 'none';
                                document.body.style.overflow = 'auto';
                            }
                        });
                    });
                });
            }

            // 显示详情
            function displayDetails(paper) {
                // 处理摘要格式
                let abstract = paper.abstract || '无摘要';
                // 使用markdown解析库处理abstract
                abstract = marked.parse(abstract);

                modalDetails.innerHTML = `
                    <h2><a href="${paper.url || '#'}" target="_blank" rel="noopener">${paper.title || '无标题'}</a></h2>
                    <p><strong>期刊/日期/作者:</strong> ${paper.journal || '未知'} · ${paper.date || '未知'} · ${paper.authors || '未知'}</p>
                    <p>
                        ${paper.doi ? `<strong>DOI:</strong> <a href="https://doi.org/${paper.doi}" target="_blank" rel="noopener">${paper.doi}</a>` : ""}
                        ${paper.doi && paper.pdf ? ` · ` : ""}
                        ${paper.pdf ? `<strong>PDF:</strong> <a href="${paper.pdf}" target="_blank" rel="noopener">查看</a>` : ""}
                    </p>
                    ${paper.ai?.keywords && Array.isArray(paper.ai.keywords) ? `<div class="keywords"><strong>关键词:</strong> ${paper.ai.keywords.map(keyword => `<span class="keyword">${keyword}</span>`).join('')}</div>` : ""}
                    ${paper.ai?.TLDR ? `<p><strong>简要总结:</strong> ${paper.ai.TLDR}</p>` : ""}
                    ${paper.ai?.translation ? `<div class="paper-translation"><strong>摘要:</strong>${marked.parse(paper.ai.translation)}</div>` : ""}
                    ${paper.abstract ? `<div class="paper-abstract"><strong>Abstract:</strong>${marked.parse(paper.abstract)}</div>` : ""}
                `;

            }

            // 组合调用
            loadPapersData('data/llm_output.json')
                .then(papers => renderPapersCards(container, papers))
                .catch(error => {
                    console.error('加载论文时出错:', error);
                    container.innerHTML = `<div style='grid-column: 1 / -1; text-align: center; padding: 40px; color: #d93025;'>加载论文失败: ${error.message}</div>`;
                });

        });
    </script>
</body>
</html>
